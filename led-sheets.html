    .tile { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: border-color 0.25s, transform 0.2s; box-shadow: var(--shadow); }

    .tile::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent); opacity: 0; transition: opacity 0.3s; }

<script>
(function() {
  var wrap     = document.getElementById('il-mascot-wrap');
  var bubble   = document.getElementById('il-bubble');
  var link     = document.getElementById('il-link');
  var closeBtn = document.getElementById('il-close');
  var revealed = true;
  var frame = 0;

  function tick() {
    frame += 1;
    var t = frame * 0.07;
    var body = document.getElementById('il-body');
    var la   = document.getElementById('il-la');
    var ra   = document.getElementById('il-ra');
    var ll   = document.getElementById('il-ll');
    var rl   = document.getElementById('il-rl');
    if (body) body.style.transform = 'translateY(' + (Math.abs(Math.sin(t*2.2))*-8) + 'px) rotate(' + (Math.sin(t*1.1)*3) + 'deg)';
    if (la)   la.style.transform   = 'rotate(' + (Math.sin(t*2.2)*18) + 'deg)';
    if (ra)   ra.style.transform   = 'rotate(' + (-Math.sin(t*2.2)*20-10) + 'deg)';
    if (ll)   ll.style.transform   = 'rotate(' + (Math.sin(t*2.2+Math.PI)*10) + 'deg)';
    if (rl)   rl.style.transform   = 'rotate(' + (-Math.sin(t*2.2+Math.PI)*10) + 'deg)';
    requestAnimationFrame(tick);
  }
  tick();

  function reveal() {
    revealed = true;
    wrap.style.transform = 'translateX(0px)';
    bubble.style.right = '165px';
    closeBtn.style.opacity = '1';
    closeBtn.style.pointerEvents = 'auto';
  }

  function hide() {
    revealed = false;
    wrap.style.transform = 'translateX(130px)';
    bubble.style.right = '70px';
    closeBtn.style.opacity = '0';
    closeBtn.style.pointerEvents = 'none';
  }

  /* Clicking the bubble reveals the mascot */
  bubble.addEventListener('click', function() {
    if (!revealed) reveal();
  });

  /* Clicking the mascot link: only navigates to the PDF if already revealed */
  link.addEventListener('click', function(e) {
    if (!revealed) {
      e.preventDefault();
      reveal();
    }
    /* else: let default link behavior open the PDF in a new tab */
  });

  closeBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    hide();
  });
})();
</script>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzVs0pljy0IM55Tm65BXky729JlOhA_hvPa_clDrKKatnZ0uvaK7LZ-E2DwRm8_FfEa/exec';
    const SHEET   = "LED Sheets & Specialty";

    function buildTile(name, img, spec, sku) {
      const imgId = `img-${Math.random().toString(36).slice(2)}`;
      const tile  = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = `
        <div class="tile-img-wrap">
          ${img ? `<img id="${imgId}" src="${img}" alt="${name}" loading="lazy" />` : `<div class="tile-img-placeholder">💡</div>`}
        </div>
        <div class="tile-body">
          <div class="tile-name">${name}</div>
          ${spec ? `<a href="${spec}" target="_blank" rel="noopener" class="btn-spec">Spec Sheet</a>` : ''}
          ${sku  ? `<hr class="tile-divider"><div class="tile-sku"><span class="tile-sku-label">SKU</span><span class="tile-sku-val">${sku}</span></div>` : ''}
        </div>`;
      if (img) {
        const imgEl = tile.querySelector(`#${imgId}`);
        imgEl.addEventListener('error', () => { imgEl.parentElement.innerHTML = `<div class="tile-img-placeholder">💡</div>`; });
      }
      return tile;
    }

    async function loadProducts() {
      const content = document.getElementById('content');
      try {
        const res   = await fetch(`${API_URL}?sheet=${encodeURIComponent(SHEET)}`);
        const rows  = await res.json();
        const valid = rows.filter(r => r.name && r.name.trim());

        if (valid.length === 0) {
          content.innerHTML = `<div class="state-message"><div class="icon">📭</div>No products found.</div>`;
          return;
        }

        // Group by section
        const sections = {};
        const sectionOrder = [];
        valid.forEach(r => {
          const sec = r.section && r.section.trim() ? r.section.trim() : 'Other';
          if (!sections[sec]) { sections[sec] = []; sectionOrder.push(sec); }
          sections[sec].push(r);
        });

        content.innerHTML = '';
        sectionOrder.forEach(secName => {
          const wrap = document.createElement('div');
          wrap.className = 'product-section';
          const header = document.createElement('div');
          header.className = 'section-header';
          header.innerHTML = `<span class="section-title">${secName}</span><div class="section-line"></div>`;
          const grid = document.createElement('div');
          grid.className = 'product-grid';
          sections[secName].forEach(({ name, img, spec, sku }) => {
            grid.appendChild(buildTile(name, img, spec, sku));
          });
          const row = document.createElement('div');
          row.className = 'product-row';
          const leftArrow = document.createElement('div');
          leftArrow.className = 'scroll-arrow';
          leftArrow.textContent = '‹';
          leftArrow.onclick = () => grid.scrollBy({ left: -280, behavior: 'smooth' });
          const rightArrow = document.createElement('div');
          rightArrow.className = 'scroll-arrow';
          rightArrow.textContent = '›';
          rightArrow.onclick = () => grid.scrollBy({ left: 280, behavior: 'smooth' });
          row.appendChild(leftArrow);
          row.appendChild(grid);
          row.appendChild(rightArrow);
          wrap.appendChild(header);
          wrap.appendChild(row);
          content.appendChild(wrap);
        });

      } catch(e) {
        console.error(e);
        content.innerHTML = `<div class="state-message"><div class="icon">⚠️</div>Couldn't load data.</div>`;
      }
    }

    loadProducts();
    setInterval(loadProducts, 30000);
  </script>
